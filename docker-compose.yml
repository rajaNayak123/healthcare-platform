version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hc-network

  backend:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: hc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-healthcare_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      JWT_SECRET: ${JWT_SECRET:-healthcare-appointment-platform-super-secret-key-change-in-production-min-256-bits}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - hc-network

  worker:
    build:
      context: ./worker-python
      dockerfile: Dockerfile
    container_name: hc-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-appointment-events}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-appointment-notification-worker}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-appointment-events-dlq}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-healthcare_db}
      SPRING_BACKEND_URL: ${SPRING_BACKEND_URL:-http://backend:8080}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-3}
      BASE_RETRY_DELAY_S: ${BASE_RETRY_DELAY_S:-2.0}
    ports:
      - "${WORKER_PORT:-8000}:8000"
    networks:
      - hc-network

  frontend:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_WORKER_BASE_URL: ${NEXT_PUBLIC_WORKER_BASE_URL:-http://localhost:8000}
    container_name: hc-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - worker
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_WORKER_BASE_URL: ${NEXT_PUBLIC_WORKER_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - hc-network

networks:
  hc-network:
    driver: bridge

volumes:
  postgres_data:
